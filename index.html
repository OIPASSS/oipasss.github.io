<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIPASSS</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: #0d0d0d;
            --card-border: #1a1a1a;
            --sub-text: #777777;
            --badge-bg: #ffffff;
            --badge-color: #000000;
            --particle-color: rgba(255, 255, 255, 0.25);
            --flask-color: #ffffff;
        }
        [data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #000000;
            --card-bg: #f9f9f9;
            --card-border: #e5e5e5;
            --sub-text: #666666;
            --badge-bg: #000000;
            --badge-color: #ffffff;
            --particle-color: rgba(0, 0, 0, 0.2);
            --flask-color: #000000;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: flex-start;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
            position: relative;
        }
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
            margin-left: 5%;
            text-align: left;
            position: relative;
            z-index: 2;
        }
        @media (min-width: 768px) {
            .container {
                margin-left: 10%;
                padding: 60px 40px;
            }
        }
        .header-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: transparent;
            object-fit: cover;
            transition: filter 0.3s;
        }
        [data-theme="light"] .logo-img {
            filter: invert(1);
        }
        .theme-toggle {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            padding: 8px 16px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 20px;
            margin-bottom: 30px;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }
        h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            font-weight: 900;
        }
        p.bio {
            color: var(--sub-text);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0;
            max-width: 450px;
        }
        .section-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: bold;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 10px;
            max-width: 550px;
        }
        .releases {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
            max-width: 550px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }
        .card:hover {
            transform: translateX(5px);
            border-color: var(--text-color);
        }
        .card-main {
            display: flex;
            align-items: center;
        }
        .card-cover {
            width: 55px;
            height: 55px;
            border-radius: 8px;
            margin-right: 15px;
            flex-shrink: 0;
            object-fit: cover;
            background: var(--card-border);
        }
        .card-info {
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .badge {
            background: var(--badge-bg);
            color: var(--badge-color);
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 1px;
            font-weight: bold;
            text-transform: none;
        }
        .card-type {
            font-size: 0.75rem;
            color: var(--sub-text);
        }
        .play-btn {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--card-border);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .card:hover .play-btn {
            background: var(--text-color);
            color: var(--bg-color);
        }
        .custom-like-container {
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            max-width: 550px;
            display: flex;
            align-items: center;
            gap: 25px;
            box-sizing: border-box;
        }
        .flask-svg-wrapper {
            width: 50px;
            height: 70px;
            flex-shrink: 0;
        }
        .like-controls {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .heart-btn {
            background: none;
            border: none;
            font-size: 2.2rem;
            cursor: pointer;
            padding: 0;
            width: max-content;
            color: var(--text-color);
            transition: transform 0.1s, color 0.2s;
            line-height: 1;
        }
        .heart-btn:disabled {
            cursor: default;
        }
        .like-stats {
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .target-node {
            color: var(--sub-text);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="container">
        <button class="theme-toggle" id="themeButton">Сменить тему</button>
        <div class="header-section">
            <img src="images/logo.png" class="logo-img" alt="OIPASSS">
            <div class="brand-info">
                <h1>OIPASSS</h1>
                <p class="bio">Официальный сайт исполнителя</p>
            </div>
        </div>
        <div class="section-title">Релизы</div>
        <div class="releases">
            <div class="card">
                <div class="card-main">
                    <img src="images/avine.jpg" class="card-cover" onerror="this.src='var(--card-border)'">
                    <div class="card-info">
                        <div class="card-title">Avine <span class="badge">Новый релиз</span></div>
                        <div class="card-type">Сингл</div>
                    </div>
                </div>
                <button class="play-btn" onclick="playAudio('tracks/avine.mp3', this)">Послушать отрывок</button>
            </div>
            <div class="card">
                <div class="card-main">
                    <img src="images/lastphoto.jpg" class="card-cover" onerror="this.src='images/logo.png'">
                    <div class="card-info">
                        <div class="card-title">Last Photo</div>
                        <div class="card-type">Сингл</div>
                    </div>
                </div>
                <button class="play-btn" onclick="playAudio('tracks/lastphoto.mp3', this)">Послушать</button>
            </div>
            <div class="card">
                <div class="card-main">
                    <img src="images/mambo.jpg" class="card-cover" onerror="this.src='images/logo.png'">
                    <div class="card-info">
                        <div class="card-title">Mambo</div>
                        <div class="card-type">Сингл</div>
                    </div>
                </div>
                <button class="play-btn" onclick="playAudio('tracks/mambo.mp3', this)">Послушать</button>
            </div>
            <div class="card">
                <div class="card-main">
                    <img src="images/emptyroad.jpg" class="card-cover" onerror="this.src='images/logo.png'">
                    <div class="card-info">
                        <div class="card-title">Empty Road</div>
                        <div class="card-type">Сингл</div>
                    </div>
                </div>
                <button class="play-btn" onclick="playAudio('tracks/emptyroad.mp3', this)">Послушать</button>
            </div>
            <div class="card">
                <div class="card-main">
                    <img src="images/breath.jpg" class="card-cover" onerror="this.src='images/logo.png'">
                    <div class="card-info">
                        <div class="card-title">Breath</div>
                        <div class="card-type">Сингл</div>
                    </div>
                </div>
                <button class="play-btn" onclick="playAudio('tracks/breath.mp3', this)">Послушать</button>
            </div>
            <div class="card">
                <div class="card-main">
                    <img src="images/scarlet.jpg" class="card-cover" onerror="this.src='images/logo.png'">
                    <div class="card-info">
                        <div class="card-title">Scarlet</div>
                        <div class="card-type">Сингл</div>
                    </div>
                </div>
                <button class="play-btn" onclick="playAudio('tracks/scarlet.mp3', this)">Послушать</button>
            </div>
            <div class="card">
                <div class="card-main">
                    <img src="images/snowywind.jpg" class="card-cover" onerror="this.src='images/logo.png'">
                    <div class="card-info">
                        <div class="card-title">Snowy Wind</div>
                        <div class="card-type">Сингл</div>
                    </div>
                </div>
                <button class="play-btn" onclick="playAudio('tracks/snowywind.mp3', this)">Послушать</button>
            </div>
            <div class="card">
                <div class="card-main">
                    <img src="images/moonstone.jpg" class="card-cover" onerror="this.src='images/logo.png'">
                    <div class="card-info">
                        <div class="card-title">Moonstone</div>
                        <div class="card-type">Сингл</div>
                    </div>
                </div>
                <button class="play-btn" onclick="playAudio('tracks/moonstone.mp3', this)">Послушать</button>
            </div>
            <div class="card">
                <div class="card-main">
                    <img src="images/starryrush.jpg" class="card-cover" onerror="this.src='images/logo.png'">
                    <div class="card-info">
                        <div class="card-title">Starry Rush</div>
                        <div class="card-type">Сингл</div>
                    </div>
                </div>
                <button class="play-btn" onclick="playAudio('tracks/starryrush.mp3', this)">Послушать</button>
            </div>
        </div>
        <div class="custom-like-container">
            <div class="flask-svg-wrapper">
                <svg viewBox="0 0 60 80" width="100%" height="100%">
                    <defs>
                        <mask id="flask-mask">
                            <path d="M 25 5 L 35 5 L 35 25 L 55 55 A 15 15 0 0 1 40 75 L 20 75 A 15 15 0 0 1 5 55 L 25 25 Z" fill="white" />
                        </mask>
                    </defs>
                    <rect id="liquid" x="0" y="80" width="60" height="80" fill="var(--flask-color)" mask="url(#flask-mask)" style="transition: y 0.6s ease-in-out;" />
                    <path d="M 25 5 L 35 5 L 35 25 L 55 55 A 15 15 0 0 1 40 75 L 20 75 A 15 15 0 0 1 5 55 L 25 25 Z" fill="none" stroke="var(--flask-color)" stroke-width="3" stroke-linejoin="round" />
                </svg>
            </div>
            <div class="like-controls">
                <button class="heart-btn" id="heartBtn">♡</button>
                <div class="like-stats" id="likeStats">Лайков: 0</div>
                <div class="target-node" id="targetNode">Цель: 10</div>
            </div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.3 - 0.15;
                this.speedY = Math.random() * 0.3 - 0.15;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--particle-color').trim();
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function initParticles() { for (let i = 0; i < 35; i++) particles.push(new Particle()); }
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        initParticles(); animateParticles();

        let baseLikes = 0;
        let userHasLiked = localStorage.getItem('oipasss_voted') === 'true';
        let totalLikes = baseLikes + (userHasLiked ? 1 : 0);

        const heartBtn = document.getElementById('heartBtn');
        const liquid = document.getElementById('liquid');
        const likeStats = document.getElementById('likeStats');
        const targetNode = document.getElementById('targetNode');

        function getTarget(currentLikes) {
            if (currentLikes < 10) return 10;
            if (currentLikes < 100) return 100;
            if (currentLikes < 1000) return 1000;
            return Math.pow(10, Math.floor(Math.log10(currentLikes)) + 1);
        }

        function updateLikesUI() {
            const target = getTarget(totalLikes);
            likeStats.innerText = `Лайков: ${totalLikes}`;
            targetNode.innerText = `Цель: ${target}`;
            
            const percentage = Math.min((totalLikes / target) * 100, 100);
            const yPosition = 80 - (80 * (percentage / 100));
            liquid.setAttribute('y', yPosition);

            if (userHasLiked) {
                heartBtn.innerText = '♥';
                heartBtn.style.color = 'var(--flask-color)';
                heartBtn.disabled = true;
            } else {
                heartBtn.innerText = '♡';
                heartBtn.disabled = false;
            }
        }

        heartBtn.addEventListener('click', () => {
            if (!userHasLiked) {
                userHasLiked = true;
                totalLikes++;
                localStorage.setItem('oipasss_voted', 'true');
                updateLikesUI();
            }
        });
        updateLikesUI();

        let currentAudio = null, currentButton = null;
        function playAudio(url, btn) {
            if (currentAudio && currentButton === btn) { currentAudio.pause(); currentAudio = null; btn.innerText = "Послушать"; return; }
            if (currentAudio) { currentAudio.pause(); if (currentButton) currentButton.innerText = "Послушать"; }
            currentAudio = new Audio(url); currentButton = btn; btn.innerText = "Пауза"; currentAudio.play();
            currentAudio.onended = () => { btn.innerText = "Послушать"; currentAudio = null; currentButton = null; };
        }
        const button = document.getElementById('themeButton');
        button.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'light') { document.documentElement.removeAttribute('data-theme'); }
            else { document.documentElement.setAttribute('data-theme', 'light'); }
        });
    </script>
</body>
</html>
