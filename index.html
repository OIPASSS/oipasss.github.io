<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIPASSS</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: #0d0d0d;
            --card-border: #1a1a1a;
            --sub-text: #777777;
            --badge-bg: #ffffff;
            --badge-color: #000000;
        }
        [data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #000000;
            --card-bg: #f9f9f9;
            --card-border: #e5e5e5;
            --sub-text: #666666;
            --badge-bg: #000000;
            --badge-color: #ffffff;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: flex-start;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }
        .container {
            max-width: 800px;
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
            margin-left: 5%;
            text-align: left;
        }
        @media (min-width: 768px) {
            .container {
                margin-left: 10%;
                padding: 60px 40px;
            }
        }
        .header-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ffffff;
            padding: 3px;
            box-sizing: border-box;
            transition: filter 0.3s;
        }
        [data-theme="light"] .logo-img {
            filter: invert(1);
        }
        .theme-toggle {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            padding: 8px 16px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 20px;
            margin-bottom: 30px;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }
        h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            font-weight: 900;
        }
        p.bio {
            color: var(--sub-text);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0;
            max-width: 450px;
        }
        .section-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: bold;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 10px;
            max-width: 550px;
        }
        .releases {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
            max-width: 550px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }
        .card:hover {
            transform: translateX(5px);
            border-color: var(--text-color);
        }
        .card-main {
            display: flex;
            align-items: center;
        }
        .card-cover {
            width: 55px;
            height: 55px;
            border-radius: 8px;
            margin-right: 15px;
            flex-shrink: 0;
            object-fit: cover;
            background: var(--card-border);
        }
        .card-info {
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .badge {
            background: var(--badge-bg);
            color: var(--badge-color);
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 1px;
            font-weight: bold;
            text-transform: none;
        }
        .card-type {
            font-size: 0.75rem;
            color: var(--sub-text);
        }
        .play-btn {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--card-border);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .card:hover .play-btn {
            background: var(--text-color);
            color: var(--bg-color);
            border-color: var(--text-color);
        }
        .like-section {
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            max-width: 550px;
        }
        .like-title {
            font-size: 0.8rem;
            color: var(--sub-text);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .like-button-wrapper {
            display: flex;
            justify-content: flex-start;
        }
    </style>
    <script src="https://unpkg.com"></script>
</head>
<body>

        <div class="like-section">
            <div class="like-title">Сайт живет? Проверь:</div>

            </div>
        </div>
    </div>
    <script>
        let currentAudio = null, currentButton = null;
        function playAudio(url, btn) {
            if (currentAudio && currentButton === btn) {
                currentAudio.pause();
                currentAudio = null;
                btn.innerText = "Послушать";
                return;
            }
            if (currentAudio) {
                currentAudio.pause();
                if (currentButton) currentButton.innerText = "Послушать";
            }
            currentAudio = new Audio(url);
            currentButton = btn;
            btn.innerText = "Пауза";
            currentAudio.play();
            currentAudio.onended = () => {
                btn.innerText = "Послушать";
                currentAudio = null;
                currentButton = null;
            };
        }
        const button = document.getElementById('themeButton');
        button.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        });
    </script>

</html>
