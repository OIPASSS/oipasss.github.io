<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIPASSS</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: #0d0d0d;
            --card-border: #1a1a1a;
            --sub-text: #777777;
            --badge-bg: #ffffff;
            --badge-color: #000000;
            --particle-color: rgba(255, 255, 255, 0.25);
            --flask-color: #ffffff;
        }
        [data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #000000;
            --card-bg: #f9f9f9;
            --card-border: #e5e5e5;
            --sub-text: #666666;
            --badge-bg: #000000;
            --badge-color: #ffffff;
            --particle-color: rgba(0, 0, 0, 0.2);
            --flask-color: #000000;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: flex-start;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
            position: relative;
        }
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeOutScreen 0.5s ease-in-out 3s forwards;
        }
        #preloader img {
            width: 140px;
            height: 140px;
            opacity: 0;
            transform: scale(0.8);
            filter: invert(0);
            animation: crawlInLogo 1.5s ease-out 0.3s forwards;
        }
        @keyframes crawlInLogo {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes fadeOutScreen {
            0% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }
        .main-content {
            opacity: 0;
            animation: fadeInSite 0.8s ease-in-out 3.2s forwards;
            width: 100%;
            display: flex;
            justify-content: flex-start;
        }
        @keyframes fadeInSite {
            0% { opacity: 0; transform: translateY(5px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .container {
            max-width: 800px;
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
            margin-left: 5%;
            text-align: left;
            position: relative;
            z-index: 2;
        }
        @media (min-width: 768px) {
            .container {
                margin-left: 10%;
                padding: 60px 40px;
            }
        }
        .header-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: transparent;
            object-fit: cover;
            transition: filter 0.3s;
        }
        [data-theme="light"] .logo-img {
            filter: invert(1);
        }
        .theme-toggle, .follow-btn {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            padding: 8px 16px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 20px;
            margin-bottom: 30px;
            transition: all 0.3s;
            margin-right: 10px;
        }
        .theme-toggle:hover, .follow-btn:hover:not(:disabled) {
            background: var(--text-color);
            color: var(--bg-color);
        }
        .follow-btn:disabled {
            background: var(--card-border);
            color: var(--sub-text);
            border-color: var(--card-border);
            cursor: default;
        }
        h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            font-weight: 900;
        }
        p.bio {
            color: var(--sub-text);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0;
            max-width: 450px;
        }
        .section-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: bold;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 10px;
            max-width: 550px;
        }
        .releases {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
            max-width: 550px;
            transition: all 0.5s ease;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            order: 2;
        }
        .card.pinned {
            order: 0 !important;
        }
        .card.top-trending {
            order: 1;
        }
        .card:hover {
            transform: translateX(5px);
            border-color: var(--text-color);
        }
        .card-main {
            display: flex;
            align-items: center;
        }
        .card-cover {
            width: 55px;
            height: 55px;
            border-radius: 8px;
            margin-right: 15px;
            flex-shrink: 0;
            object-fit: cover;
            background: var(--card-border);
        }
        .card-info {
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .badge {
            background: var(--badge-bg);
            color: var(--badge-color);
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 1px;
            font-weight: bold;
            text-transform: none;
        }
        .badge.trend-badge {
            background: #ff3333;
            color: #ffffff;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .card-stats {
            font-size: 0.75rem;
            color: var(--sub-text);
            display: flex;
            gap: 10px;
        }
        .controls-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .play-btn, .share-btn {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--card-border);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .share-btn {
            padding: 6px 9px;
            font-size: 0.8rem;
        }
        .card:hover .play-btn, .card:hover .share-btn {
            border-color: var(--text-color);
        }
        .play-btn:hover, .share-btn:hover {
            background: var(--text-color) !important;
            color: var(--bg-color) !important;
        }
        .custom-like-container {
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            max-width: 550px;
            display: flex;
            align-items: center;
            gap: 25px;
            box-sizing: border-box;
        }
        .flask-svg-wrapper {
            width: 50px;
            height: 70px;
            flex-shrink: 0;
        }
        .like-controls {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .heart-btn {
            background: none;
            border: none;
            font-size: 2.2rem;
            cursor: pointer;
            padding: 0;
            width: max-content;
            color: var(--text-color);
            transition: transform 0.1s, color 0.2s;
            line-height: 1;
        }
        .heart-btn:disabled {
            cursor: default;
        }
        .like-stats, .followers-stats {
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .target-node {
            color: var(--sub-text);
            font-size: 0.75rem;
        }
    </style>
</head>

    <script>
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.3 - 0.15;
                this.speedY = Math.random() * 0.3 - 0.15;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--particle-color').trim();
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function initParticles() { for (let i = 0; i < 35; i++) particles.push(new Particle()); }
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        initParticles(); animateParticles();
        
        const firebaseConfig = {
            apiKey: "AIzaSyBIkEe_9Qsw8yPIH4ilFc9lbVNSC76KHtw",
            authDomain: "oipasss.firebaseapp.com",
            databaseURL: "https://oipasss-defaut-rtdb.firebaseio.com",
            projectId: "oipasss",
            storageBucket: "oipasss.firebasestorage.app",
            messagingSenderId: "600072677650",
            appId: "1:600072677650:web:98df6f60bed76a15db2bcb"
        };


        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let totalLikes = 0;
        let followersCount = 0;
        let streams = { lastphoto: 1, mambo: 1, emptyroad: 3, breath: 1, scarlet: 1, snowywind: 1, moonstone: 1, starryrush: 1, avine: 1 };

        let userHasLiked = localStorage.getItem('oipasss_voted') === 'true';
        let userHasFollowed = localStorage.getItem('oipasss_followed') === 'true';
        let countedTracks = JSON.parse(localStorage.getItem('oipasss_counted_tracks')) || {};

        const heartBtn = document.getElementById('heartBtn');
        const liquid = document.getElementById('liquid');
        const likeStats = document.getElementById('likeStats');
        const targetNode = document.getElementById('targetNode');
        const followBtn = document.getElementById('followBtn');
        const followerStats = document.getElementById('followerStats');
        const container = document.getElementById('releasesContainer');

        function getTarget(currentLikes) {
            if (currentLikes < 10) return 10;
            if (currentLikes < 100) return 100;
            if (currentLikes < 1000) return 1000;
            return Math.pow(10, Math.floor(Math.log10(currentLikes)) + 1);
        }

        function updateLikesUI() {
            const target = getTarget(totalLikes);
            likeStats.innerText = `Лайков: ${totalLikes}`;
            targetNode.innerText = `Цель: ${target}`;
            const percentage = Math.min((totalLikes / target) * 100, 100);
            const yPosition = Math.round(80 - (80 * (percentage / 100)));
            liquid.setAttribute('y', yPosition);
            if (userHasLiked) { heartBtn.innerText = '♥'; heartBtn.disabled = true; } 
            else { heartBtn.innerText = '♡'; heartBtn.disabled = false; }
        }

        function updateFollowUI() {
            followerStats.innerText = `Подписчиков: ${followersCount}`;
            if (userHasFollowed) { followBtn.innerText = 'Вы подписаны'; followBtn.disabled = true; } 
            else { followBtn.innerText = '+ Подписаться'; followBtn.disabled = false; }
        }
        function sortChart() {
            if (!container) return;
            let cards = Array.from(container.getElementsByClassName('card'));
            cards.forEach(card => {
            const id = card.id.replace('card-', '');
            const streamElement = document.getElementById(`stream-${id}`);
                if (streamElement) streamElement.innerText = `🎧 ${streams[id] || 0}`;
                const trendZone = card.querySelector('.trend-zone');
                if (trendZone) trendZone.innerHTML = '';
                card.classList.remove('top-trending');
            });

            let sortableCards = cards.filter(card => !card.classList.contains('pinned'));
            sortableCards.sort((a, b) => {
                const idA = a.id.replace('card-', '');
                const idB = b.id.replace('card-', '');
                return (streams[idB] || 0) - (streams[idA] || 0);
            });

            if (sortableCards.length > 0) {
                const topCard = sortableCards[0];
                const topId = topCard.id.replace('card-', '');
                if ((streams[topId] || 0) > 0) {
                    topCard.classList.add('top-trending');
                    const trendZone = topCard.querySelector('.trend-zone');
                    if (trendZone) trendZone.innerHTML = '<span class="badge trend-badge">🔥 ТРЕНД</span>';
                }
            }

            sortableCards.forEach(card => container.appendChild(card));
        }
        db.ref('stats/totalLikes').on('value', (snapshot) => {
            totalLikes = snapshot.val() || 0;
            updateLikesUI();
        });

        db.ref('stats/followersCount').on('value', (snapshot) => {
            followersCount = snapshot.val() || 0;
            updateFollowUI();
        });

        db.ref('stats/streams').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && typeof data === 'object') {
                for (let key in streams) {
                    if (data[key] !== undefined && data[key] !== null) {
                        streams[key] = data[key];
                    }
                }
            }
            sortChart();
        });
        heartBtn.addEventListener('click', () => {
            if (!userHasLiked && db) {
                userHasLiked = true;
                localStorage.setItem('oipasss_voted', 'true');
                db.ref('stats/totalLikes').transaction(current => (current || 0) + 1);
            }
        });

        followBtn.addEventListener('click', () => {
            if (!userHasFollowed && db) {
                userHasFollowed = true;
                localStorage.setItem('oipasss_followed', 'true');
                db.ref('stats/followersCount').transaction(current => (current || 0) + 1);
            }
        });

        window.currentAudio = null;
        window.currentButton = null;
        window.currentTrackId = null;
        window.listenTimer = null;
        
        window.playAudio = function(url, btn, trackId) {
            if (window.currentAudio && window.currentButton === btn) {
                window.currentAudio.pause();
                window.currentAudio = null;
                btn.innerText = "Послушать";
                if (window.listenTimer) { clearTimeout(window.listenTimer); window.listenTimer = null; }
                return;
            }

            if (window.currentAudio) {
                window.currentAudio.pause();
                if (window.currentButton) window.currentButton.innerText = "Послушать";
                if (window.listenTimer) { clearTimeout(window.listenTimer); window.listenTimer = null; }
            }
            
            window.currentAudio = new Audio(url);
            window.currentButton = btn;
            window.currentTrackId = trackId;
            btn.innerText = "Пауза";
            window.currentAudio.play();

            if (!countedTracks[trackId]) {
                window.listenTimer = setTimeout(() => {
                    countedTracks[trackId] = true;
                    localStorage.setItem('oipasss_counted_tracks', JSON.stringify(countedTracks));
                    if (db) {
                        db.ref('stats/streams').child(trackId).transaction(current => (current || 0) + 1);
                    }
                    window.listenTimer = null;
                }, 10000);
            }

            window.currentAudio.onended = () => {
                btn.innerText = "Послушать";
                window.currentAudio = null;
                window.currentButton = null;
                if (window.listenTimer) { clearTimeout(window.listenTimer); window.listenTimer = null; }
            };
        };
        window.shareTrack = function(trackName) {
            const shareText = `Слушаю трек "${trackName}" от OIPASSS на его официальном сайте! 🎧\n${window.location.href}`;
            navigator.clipboard.writeText(shareText).then(() => {
                alert(`Ссылка на трек "${trackName}" скопирована! Отправь её друзьям.`);
            }).catch(() => {
                alert('Не удалось копировать ссылку.');
            });
        }

        // привязка кликов ко всем кнопкам на странице
        document.querySelectorAll('.card').forEach(card => {
           const trackId = card.getAttribute('data-id');
            const playBtn = card.querySelector('.play-btn');
            const shareBtn = card.querySelector('.share-btn');
            
            // Пытаемся взять пути из старой структуры или по дефолту
            const trackUrl = `tracks/${trackId}.mp3`;
            const trackName = card.querySelector('.card-title').innerText.replace('Новый релиз', '').replace('🔥 ТРЕНД', '').trim();

            if (playBtn) {
                playBtn.removeAttribute('onclick'); // Очищаем старые onclick, если они остались
                playBtn.addEventListener('click', () => window.playAudio(trackUrl, playBtn, trackId));
            }
            if (shareBtn) {
                shareBtn.removeAttribute('onclick');
                shareBtn.addEventListener('click', () => window.shareTrack(trackName));
            }
        });

        const button = document.getElementById('themeButton');
        if (button) {
            button.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                if (currentTheme === 'light') { document.documentElement.removeAttribute('data-theme'); }
                else { document.documentElement.setAttribute('data-theme', 'light'); }
            });
        }

        // Принудительный запуск сортировки чарта сразу после привязки кнопок
        sortChart();
    </script>
</body>
</html>
