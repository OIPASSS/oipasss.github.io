<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIPASSS — Официальный сайт</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: #111111;
            --card-border: #222222;
            --sub-text: #888888;
        }

        [data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #000000;
            --card-bg: #f5f5f5;
            --card-border: #dddddd;
            --sub-text: #666666;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 600px;
            padding: 40px 20px;
        }

        .theme-toggle {
            background: var(--text-color);
            color: var(--bg-color);
            border: none;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 40px;
            transition: background-color 0.3s, color 0.3s;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 6px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            font-weight: 900;
        }

        p.bio {
            color: var(--sub-text);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .releases {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 50px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 0px;
            padding: 25px 20px;
            transition: transform 0.2s, background-color 0.3s, border-color 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-cover {
            width: 120px;
            height: 120px;
            background: var(--text-color);
            color: var(--bg-color);
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            transition: background-color 0.3s, color 0.3s;
        }

        .card-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .card-type {
            font-size: 0.8rem;
            color: var(--sub-text);
            letter-spacing: 1px;
        }

        .like-section {
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            padding: 30px 20px;
            margin-top: 20px;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .like-title {
            font-size: 0.9rem;
            color: var(--sub-text);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .like-button-wrapper {
            display: flex;
            justify-content: center;
        }
    </style>
    <script src="https://unpkg.com"></script>
</head>
<body>

    <div class="container">
        <button class="theme-toggle" id="themeButton">Сменить тему</button>

        <h1>OIPASSS</h1>
        <p class="bio">Официальный сайт музыканта. Здесь живут мои релизы.</p>

        <div class="section-title">Релизы</div>
        <div class="releases">
            <div class="card">
                <div class="card-cover">O</div>
                <div class="card-title">Трек 1</div>
                <div class="card-type">Сингл</div>
            </div>
            <div class="card">
                <div class="card-cover">P</div>
                <div class="card-title">Трек 2</div>
                <div class="card-type">Сингл</div>
            </div>
        </div>

        <div class="like-section">
            <div class="like-title">Сайт живет? Проверь:</div>
            <div class="like-button-wrapper">
                <div 
                  data-lyket-type="clap" 
                  data-lyket-id="oipasss-mono-site" 
                  data-lyket-namespace="musician"
                  data-lyket-template="twitter"
                ></div>
            </div>
        </div>
    </div>

    <script>
        const button = document.getElementById('themeButton');
        button.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        });
    </script>

</body>
</html>
