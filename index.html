<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIPASSS</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: #111111;
            --card-border: #222222;
            --sub-text: #888888;
            --badge-bg: #ffffff;
            --badge-color: #000000;
        }

        [data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #000000;
            --card-bg: #f5f5f5;
            --card-border: #dddddd;
            --sub-text: #666666;
            --badge-bg: #000000;
            --badge-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .theme-toggle {
            background: var(--text-color);
            color: var(--bg-color);
            border: none;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 30px;
            transition: background-color 0.3s, color 0.3s;
        }

        .logo-placeholder {
            width: 100px;
            height: 100px;
            background: var(--card-bg);
            border: 2px dashed var(--card-border);
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 6px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            font-weight: 900;
        }

        p.bio {
            color: var(--sub-text);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .releases {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            text-align: left;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .card-cover {
            width: 70px;
            height: 70px;
            background: var(--text-color);
            color: var(--bg-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            margin-right: 20px;
            flex-shrink: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .card-info {
            flex-grow: 1;
        }

        .card-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 4px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            background: var(--badge-bg);
            color: var(--badge-color);
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 10px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .card-type {
            font-size: 0.8rem;
            color: var(--sub-text);
            letter-spacing: 1px;
        }

        .play-btn {
            background: var(--text-color);
            color: var(--bg-color);
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s, color 0.3s;
        }

        .card:hover .play-btn {
            transform: scale(1.15);
        }

        .like-section {
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            padding: 30px 20px;
            margin-top: 20px;
            border-radius: 16px;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .like-title {
            font-size: 0.9rem;
            color: var(--sub-text);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .like-button-wrapper {
            display: flex;
            justify-content: center;
        }
    </style>
    <script src="https://unpkg.com"></script>
</head>
<body>

    <div class="container">
        <button class="theme-toggle" id="themeButton">Сменить тему</button>

        <div class="logo-placeholder" id="logoContainer">🌙</div>

        <h1>OIPASSS</h1>
        <p class="bio">Официальный сайт музыканта. Звуковое пространство и релизы.</p>

        <div class="section-title">Релизы</div>
        <div class="releases">
            <div class="card">
                <div class="card-cover">A</div>
                <div class="card-info">
                    <div class="card-title">Avine <span class="badge">Новый релиз</span></div>
                    <div class="card-type">Сингл</div>
                </div>
                <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
            </div>
            <div class="card">
                <div class="card-cover">L</div>
                <div class="card-info">
                    <div class="card-title">Last Photo</div>
                    <div class="card-type">Сингл</div>
                </div>
                <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
            </div>

            <div class="card">
                <div class="card-cover">M</div>
                <div class="card-info">
                    <div class="card-title">Mambo</div>
                    <div class="card-type">Сингл</div>
                </div>
                <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
            </div>

            <div class="card">
                <div class="card-cover">E</div>
                <div class="card-info">
                    <div class="card-title">Empty Road</div>
                    <div class="card-type">Сингл</div>
                </div>
                <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
            </div>

            <div class="card">
                <div class="card-cover">B</div>
                <div class="card-info">
                    <div class="card-title">Breath</div>
                    <div class="card-type">Сингл</div>
                </div>
                <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
            </div>

            <div class="card">
                <div class="card-cover">S</div>
                <div class="card-info">
                    <div class="card-title">Scarlet</div>
                    <div class="card-type">Сингл</div>
                </div>
                <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
            </div>

            <div class="card">
                <div class="card-cover">W</div>
                <div class="card-info">
                    <div class="card-title">Snowy Wind</div>
                    <div class="card-type">Сингл</div>
                </div>
                <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
            </div>

            <div class="card">
                <div class="card-cover">M</div>
                <div class="card-info">
                    <div class="card-title">Moonstone</div>
                    <div class="card-type">Сингл</div>
                </div>
                <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
            </div>

            <div class="card">
                <div class="card-cover">R</div>
                <div class="card-info">
                    <div class="card-title">Starry Rush</div>
                    <div class="card-type">Сингл</div>
                </div>
                <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
            </div>
        </div>

        <div class="like-section">
            <div class="like-title">Сайт живет? Проверь:</div>
            <div class="like-button-wrapper">
                <div 
                  data-lyket-type="clap" 
                  data-lyket-id="oipasss-final-site" 
                  data-lyket-namespace="musician"
                  data-lyket-template="twitter"
                ></div>
            </div>
        </div>
    </div>

    <script>
        let currentAudio = null;
        let currentButton = null;

        function playAudio(url, btn) {
            if (currentAudio && currentButton === btn) {
                currentAudio.pause();
                currentAudio = null;
                btn.innerText = "Послушать отрывок";
                currentButton = null;
                return;
            }

            if (currentAudio) {
                currentAudio.pause();
                if (currentButton) currentButton.innerText = "Послушать отрывок";
            }

            currentAudio = new Audio(url);
            currentButton = btn;
            btn.innerText = "Пауза";
            
            currentAudio.play();

            currentAudio.onended = () => {
                btn.innerText = "Послушать отрывок";
                currentAudio = null;
                currentButton = null;
            };
        }

        const button = document.getElementById('themeButton');
        button.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        });
    </script>

</body>
</html>
