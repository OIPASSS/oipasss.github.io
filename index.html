<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIPASSS</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: #0d0d0d;
            --card-border: #1a1a1a;
            --sub-text: #777777;
            --badge-bg: #ffffff;
            --badge-color: #000000;
            --cursor-glow: rgba(255, 255, 255, 0.15);
        }

        [data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #000000;
            --card-bg: #f9f9f9;
            --card-border: #e5e5e5;
            --sub-text: #666666;
            --badge-bg: #000000;
            --badge-color: #ffffff;
            --cursor-glow: rgba(0, 0, 0, 0.08);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: flex-start;
            min-height: 100vh;
            text-align: left;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* Эпичный экран загрузки */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: invertFlash 3.5s forwards;
        }

        #preloader img {
            width: 150px;
            height: 150px;
            opacity: 0;
            animation: fadeInLogo 1.5s ease-in-out 0.5s forwards;
        }

        @keyframes fadeInLogo {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes invertFlash {
            0% { background-color: #000000; filter: invert(0); }
            65% { background-color: #000000; filter: invert(0); }
            70% { background-color: #000000; filter: invert(1); }
            75% { background-color: #000000; filter: invert(0); }
            80% { background-color: #000000; filter: invert(1); }
            85% { background-color: #000000; filter: invert(0); opacity: 1; visibility: visible; }
            100% { background-color: #000000; filter: invert(0); opacity: 0; visibility: hidden; }
        }

        .main-content {
            opacity: 0;
            animation: fadeInContent 1s ease-in-out 3.3s forwards;
            width: 100%;
            display: flex;
            justify-content: flex-start;
        }

        @keyframes fadeInContent {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--cursor-glow) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
            z-index: 9999;
        }

        .container {
            max-width: 800px;
            width: 100%;
            padding: 60px 40px;
            box-sizing: border-box;
            margin-left: 10%;
        }

        .header-section {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .logo-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #ffffff;
            padding: 5px;
            box-sizing: border-box;
            transition: filter 0.3s;
        }

        [data-theme="light"] .logo-img {
            filter: invert(1);
        }

        .theme-toggle {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            padding: 8px 16px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 20px;
            margin-bottom: 30px;
            transition: background-color 0.3s, color 0.3s;
        }

        .theme-toggle:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        h1 {
            font-size: 2.8rem;
            letter-spacing: 4px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            font-weight: 900;
        }

        p.bio {
            color: var(--sub-text);
            font-size: 1rem;
            line-height: 1.5;
            margin: 0;
            max-width: 450px;
        }

        .section-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: bold;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 10px;
            max-width: 550px;
        }

        .releases {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
            max-width: 550px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background-color 0.2s, border-color 0.2s, transform 0.2s;
        }

        .card:hover {
            transform: translateX(5px);
            border-color: var(--text-color);
        }

        .card-main {
            display: flex;
            align-items: center;
        }

        .card-cover {
            width: 55px;
            height: 55px;
            border-radius: 8px;
            margin-right: 15px;
            flex-shrink: 0;
            object-fit: cover;
            background: var(--card-border);
        }

        .card-info {
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: var(--badge-bg);
            color: var(--badge-color);
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .card-type {
            font-size: 0.75rem;
            color: var(--sub-text);
        }

        .play-btn {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--card-border);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .card:hover .play-btn {
            background: var(--text-color);
            color: var(--bg-color);
            border-color: var(--text-color);
            transform: scale(1.05);
        }

        .like-section {
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            max-width: 550px;
            text-align: left;
        }

        .like-title {
            font-size: 0.8rem;
            color: var(--sub-text);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .like-button-wrapper {
            display: flex;
            justify-content: flex-start;
        }
    </style>
    <script src="https://unpkg.com"></script>
</head>
<body>

    <div id="preloader">
        <img src="https://imgur.com" alt="OIPASSS">
    </div>

        <div class="cursor-glow" id="glow"></div>

                        <div class="card-info">
                            <div class="card-title">Last Photo</div>
                            <div class="card-type">Сингл</div>
                        </div>
                    </div>
                    <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
                </div>

                <div class="card">
                    <div class="card-main">
                        <img src="https://yandex.net" class="card-cover" alt="Mambo">
                        <div class="card-info">
                            <div class="card-title">Mambo</div>
                            <div class="card-type">Сингл</div>
                        </div>
                    </div>
                    <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
                </div>

                <div class="card">
                    <div class="card-main">
                        <img src="https://yandex.net" class="card-cover" alt="Empty Road">
                        <div class="card-info">
                            <div class="card-title">Empty Road</div>
                            <div class="card-type">Сингл</div>
                        </div>
                    </div>
                    <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
                </div>

                <div class="card">
                    <div class="card-main">
                        <img src="https://yandex.net" class="card-cover" alt="Breath">
                        <div class="card-info">
                            <div class="card-title">Breath</div>
                            <div class="card-type">Сингл</div>
                        </div>
                    </div>
                    <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
                </div>

                <div class="card">
                    <div class="card-main">
                        <img src="https://yandex.net" class="card-cover" alt="Scarlet">
                        <div class="card-info">
                            <div class="card-title">Scarlet</div>
                            <div class="card-type">Сингл</div>
                        </div>
                    </div>
                    <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
                </div>

                <div class="card">
                    <div class="card-main">
                        <img src="https://yandex.net" class="card-cover" alt="Snowy Wind">
                        <div class="card-info">
                            <div class="card-title">Snowy Wind</div>
                            <div class="card-type">Сингл</div>
                        </div>
                    </div>
                    <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
                </div>

                <div class="card">
                    <div class="card-main">
                        <img src="https://yandex.net" class="card-cover" alt="Moonstone">
                        <div class="card-info">
                            <div class="card-title">Moonstone</div>
                            <div class="card-type">Сингл</div>
                        </div>
                    </div>
                    <button class="play-btn" onclick="playAudio('https://soundhelix.com', this)">Послушать отрывок</button>
                </div>

                <div class="card">
                    <div class="card-main">
                        <img src="https://yandex.net" class="card-cover" alt="Starry Rush">
                        <div class="card-info">
                            <div class="card-title">Starry Rush</div>

            <div class="like-section">
                <div class="like-title">Сайт живет? Проверь:</div>
                <div class="like-button-wrapper">
                    <div 
                      data-lyket-type="clap" 
                      data-lyket-id="oipasss-cinema-site" 
                      data-lyket-namespace="musician"
                      data-lyket-template="twitter"
                    ></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const glow = document.getElementById('glow');
        window.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        let currentAudio = null;
        let currentButton = null;

        function playAudio(url, btn) {
            if (currentAudio && currentButton === btn) {
                currentAudio.pause();
                currentAudio = null;
                btn.innerText = "Послушать отрывок";
                return;
            }
            if (currentAudio) {
                currentAudio.pause();
                if (currentButton) currentButton.innerText = "Послушать отрывок";
            }
            currentAudio = new Audio(url);
            currentButton = btn;
            btn.innerText = "Пауза";
            currentAudio.play();
            currentAudio.onended = () => {
                btn.innerText = "Послушать отрывок";
                currentAudio = null;
                currentButton = null;
            };
        }

        const button = document.getElementById('themeButton');
        button.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        });
    </script>
</body>
</html>
